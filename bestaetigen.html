<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="manifest.json">
  <title>Bezahlen</title>
  <link rel="stylesheet" href="bestaetigen.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <div class="header-spacer-left"></div>
      <div class="header-title">Bezahlen</div>
      <button class="abbrechen-btn" onclick="window.location.href='startpage.html'">Abbrechen</button>
    </header>

    <!-- Content -->
    <main class="content">
      <!-- Bestätige bitte die Zahlung -->
      <div class="confirm-icon">
        <img src="assets/best%C3%A4tigung/best%C3%A4tige_bitte_die_zahling.svg" alt="Bestätige bitte die Zahlung">
      </div>

      <!-- Betrag & Empfänger Card -->
      <div class="info-card">
        <div class="info-betrag">
          <span class="info-label">Betrag</span>
          <span class="info-value" id="betragValue">CHF 0.00</span>
        </div>
        <div class="info-divider"></div>
        <div class="info-empfaenger">
          <span class="info-label">Empfänger</span>
          <div class="empfaenger-preview" id="empfaengerPreview"></div>
        </div>
      </div>
    </main>

    <!-- Okay Button -->
    <div class="okay-bar">
      <button class="okay-btn" id="okayBtn">
        <img src="assets/best%C3%A4tigung/okey.svg" alt="Okay">
      </button>
    </div>
  </div>

  <script src="bestaetigen.js"></script>
</body>
</html>
