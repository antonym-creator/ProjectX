<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TWINT">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/appicon/icon.png">
  <title>Digitale Gutscheine</title>
  <link rel="stylesheet" href="gutscheine.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <button class="back-btn" id="backBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="header-title">Digitale Gutscheine</div>
      <div class="header-spacer"></div>
    </header>

    <!-- Choice Screen -->
    <main class="content" id="choiceScreen">
      <p class="subtitle">Was möchtest du hinzufügen?</p>
      <div class="choice-grid">
        <button class="choice-card" id="chooseText">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          <span>Text</span>
        </button>
        <button class="choice-card" id="chooseImage">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>Bild</span>
        </button>
      </div>

      <!-- Current saved item -->
      <div class="current-item hidden" id="currentItem">
        <div class="current-item-header">
          <span class="current-item-label">Aktuell gespeichert:</span>
          <button class="delete-btn" id="deleteBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FF3B30" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
            <span>Löschen</span>
          </button>
        </div>
        <div class="current-item-preview" id="currentItemPreview"></div>
      </div>
    </main>

    <!-- Text Input Screen -->
    <main class="content hidden" id="textScreen">
      <p class="subtitle">Gutschein-Text eingeben</p>
      <textarea class="text-input" id="gutscheinText" placeholder="Text hier eingeben..."></textarea>
      <button class="save-btn" id="saveText">Speichern</button>
    </main>

    <!-- Image Upload Screen -->
    <main class="content hidden" id="imageScreen">
      <p class="subtitle">Gutschein-Bild hochladen</p>
      <div class="upload-area" id="uploadArea">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>Tippe um ein Bild auszuwählen</span>
        <input type="file" accept="image/*" id="fileInput" class="file-input">
      </div>
      <div class="preview-container hidden" id="previewContainer">
        <img id="previewImg" alt="Vorschau">
      </div>
      <button class="save-btn hidden" id="saveImage">Speichern</button>
    </main>

    <!-- Success Screen -->
    <main class="content hidden" id="successScreen">
      <div class="success-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#34C759" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <p class="success-text">Gespeichert!</p>
    </main>
  </div>

  <script src="gutscheine.js"></script>
</body>
</html>
