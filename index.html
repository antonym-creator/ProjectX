<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TWINT">
  <meta name="theme-color" content="#f2f2f2">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/appicon/icon.png">
  <title>TWINT</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Upper half -->
    <div class="top-section">
      <div class="deko-image">
        <img src="assets/code%20eingabe/dekobild%20oben.svg" alt="Deko">
      </div>
      <div class="pin-dots">
        <span class="dot" data-index="0"></span>
        <span class="dot" data-index="1"></span>
        <span class="dot" data-index="2"></span>
        <span class="dot" data-index="3"></span>
        <span class="dot" data-index="4"></span>
        <span class="dot" data-index="5"></span>
      </div>
      <h1 class="welcome-text">Willkommen zurück!</h1>
      <p class="pin-label">TWINT PIN eingeben</p>
    </div>

    <!-- Lower half - Keypad -->
    <div class="bottom-section">
      <div class="keypad">
        <div class="keypad-row">
          <button class="key" data-value="1"><img src="assets/code%20eingabe/1.svg" alt="1"></button>
          <button class="key" data-value="2"><img src="assets/code%20eingabe/2.svg" alt="2"></button>
          <button class="key" data-value="3"><img src="assets/code%20eingabe/3.svg" alt="3"></button>
        </div>
        <div class="keypad-row">
          <button class="key" data-value="4"><img src="assets/code%20eingabe/4.svg" alt="4"></button>
          <button class="key" data-value="5"><img src="assets/code%20eingabe/5.svg" alt="5"></button>
          <button class="key" data-value="6"><img src="assets/code%20eingabe/6.svg" alt="6"></button>
        </div>
        <div class="keypad-row">
          <button class="key" data-value="7"><img src="assets/code%20eingabe/7.svg" alt="7"></button>
          <button class="key" data-value="8"><img src="assets/code%20eingabe/8.svg" alt="8"></button>
          <button class="key" data-value="9"><img src="assets/code%20eingabe/9.svg" alt="9"></button>
        </div>
        <div class="keypad-row keypad-row-bottom">
          <div class="key-placeholder"></div>
          <button class="key" data-value="0"><img src="assets/code%20eingabe/0.svg" alt="0"></button>
          <button class="key" data-value="delete"><img src="assets/code%20eingabe/l%C3%B6schen.svg" alt="Löschen"></button>
        </div>
      </div>
      <a href="#" class="forgot-pin">TWINT PIN vergessen?</a>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
