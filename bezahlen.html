<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="manifest.json">
  <title>Bezahlen</title>
  <link rel="stylesheet" href="bezahlen.css">
</head>
<body>
  <div class="app-container">
    <!-- Content -->
    <main class="content">
      <!-- Bild or Text -->
      <div class="gutschein-preview" id="gutscheinPreview"></div>

      <!-- Betrag -->
      <div class="betrag-section">
        <label class="betrag-label">Betrag</label>
        <div class="betrag-input-wrapper" id="betragWrapper">
          <span class="betrag-value" id="betragDisplay">CHF 0.00</span>
          <input type="text" inputmode="decimal" class="betrag-hidden-input" id="betragInput">
        </div>
      </div>
    </main>

    <!-- Weiter Button -->
    <div class="weiter-bar">
      <button class="weiter-btn" id="weiterBtn">
        <img src="assets/bezahlen/weiter.svg" alt="Weiter">
      </button>
    </div>
  </div>

  <script src="bezahlen.js"></script>
</body>
</html>
