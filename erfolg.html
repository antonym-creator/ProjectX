<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#3CAD3F">
  <link rel="manifest" href="manifest.json">
  <title>Zahlung erfolgreich</title>
  <link rel="stylesheet" href="erfolg.css">
</head>
<body>
  <div class="app-container">
    <!-- Top green area with animation -->
    <div class="success-area">
      <img class="success-gif" src="assets/endsite/animation.gif" alt="Zahlung erfolgreich">
      <p class="success-text">Zahlung erfolgreich</p>
    </div>

    <!-- Info Card -->
    <div class="info-card">
      <div class="info-row">
        <span class="info-label">Betrag</span>
        <span class="info-value" id="betragValue">CHF 0.00</span>
      </div>
      <div class="info-divider"></div>
      <div class="info-row">
        <span class="info-label">Datum / Zeit</span>
        <span class="info-value" id="datumValue"></span>
      </div>
      <div class="info-divider"></div>
      <div class="info-row">
        <span class="info-label">Empfänger</span>
        <div class="empfaenger-preview" id="empfaengerPreview"></div>
      </div>
    </div>

    <!-- Schliessen Button -->
    <div class="schliessen-bar">
      <button class="schliessen-btn" onclick="window.location.href='startpage.html'">Schliessen</button>
    </div>
  </div>

  <script src="erfolg.js"></script>
</body>
</html>
